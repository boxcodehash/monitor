<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MuzzStudio Tracker Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .tx-row { border-bottom: 1px solid #1e293b; transition: all 0.3s; }
        .tx-row:hover { background: #161b22; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b-2 border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">MuzzStudio Terminal v1.0</h1>
                <p class="text-slate-500">Monitoreo On-Chain en Tiempo Real</p>
            </div>
            <div class="text-right">
                <div class="flex items-center text-emerald-400 font-bold">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span> LIVE CONNECTED
                </div>
                <code class="text-xs bg-slate-900 p-2 rounded mt-2 block">0xef3dA...B8f0</code>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <aside class="col-span-3 space-y-6">
                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-800 glow">
                    <h3 class="font-bold mb-4 border-l-4 border-sky-400 pl-2">Panel de Control</h3>
                    <label class="text-xs text-slate-500 uppercase">Filtrar Wallet (Opcional)</label>
                    <input type="text" id="walletFilter" placeholder="0x..." class="w-full bg-black border border-slate-700 rounded p-2 text-sm mt-1 mb-4">
                    <p class="text-xs text-slate-500 italic">Muestra el flujo general. Escribe una wallet para aislarla en el feed.</p>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-800">
                    <h3 class="font-bold mb-4 border-l-4 border-rose-500 pl-2">Triggers de IA</h3>
                    <button class="w-full border border-rose-500 text-rose-500 py-2 rounded hover:bg-rose-500/10">Auto-Venta en Whale Dump</button>
                </div>
            </aside>

            <main class="col-span-9 bg-slate-900/30 rounded-xl border border-slate-800 overflow-hidden">
                <div class="p-4 bg-slate-900/80 font-bold border-b border-slate-800 flex justify-between items-center">
                    <span>Feed de Transacciones Globales</span>
                    <span id="filterStatus" class="text-xs bg-sky-500/10 text-sky-400 px-2 py-1 rounded">Modo: Todo el Contrato</span>
                </div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-black/50 text-slate-500">
                        <tr>
                            <th class="p-4">Bloque</th>
                            <th>Tipo</th>
                            <th>De / Para</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="txBody">
                    </tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`wss://monitor-ok0d.onrender.com/ws`);
        const txBody = document.getElementById('txBody');
        const walletFilter = document.getElementById('walletFilter');
        const filterStatus = document.getElementById('filterStatus');

        // Memoria local para mantener las últimas 100 transacciones globales del contrato
        let globalTransactions = [];

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // 1. El escaneo automático del contrato siempre guarda TODO
            globalTransactions.unshift(data);
            if(globalTransactions.length > 100) globalTransactions.pop(); 

            // 2. Actualizar lo que el usuario ve en pantalla
            renderFeed();
        };

        function renderFeed() {
            const filterValue = walletFilter.value.trim().toLowerCase();
            txBody.innerHTML = ''; 

            if (filterValue) {
                filterStatus.textContent = "Modo: Filtrado por Wallet";
                filterStatus.className = "text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded";
            } else {
                filterStatus.textContent = "Modo: Todo el Contrato";
                filterStatus.className = "text-xs bg-sky-500/10 text-sky-400 px-2 py-1 rounded";
            }

            // Filtrar sobre el flujo constante si hay algo escrito
            const transactionsToShow = globalTransactions.filter(tx => {
                if (!filterValue) return true; 
                return tx.from.toLowerCase().includes(filterValue) || tx.to.toLowerCase().includes(filterValue);
            });

            // Dibujar las filas en la tabla
            transactionsToShow.forEach(data => {
                const color = data.type === 'COMPRA' ? 'text-emerald-400' : (data.type === 'VENTA' ? 'text-rose-500' : 'text-slate-400');
                const walletDisplay = data.type === 'COMPRA' ? data.to : data.from;
                
                const row = `
                    <tr class="tx-row">
                        <td class="p-4 text-slate-500">#${data.block}</td>
                        <td class="font-bold ${color}">${data.type}</td>
                        <td class="font-mono text-sky-300 text-xs">${walletDisplay.substring(0,12)}...${walletDisplay.substring(walletDisplay.length - 4)}</td>
                        <td class="font-bold">${parseFloat(data.value).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} MUZZ</td>
                    </tr>
                `;
                txBody.insertAdjacentHTML('beforeend', row);
            });
        }

        // Escucha en tiempo real cuando escribes o borras en el buscador desde el teléfono
        walletFilter.addEventListener('input', renderFeed);
    </script>
</body>
</html>
