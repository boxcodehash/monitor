<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MuzzStudio Tracker Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .tx-row { border-bottom: 1px solid #1e293b; transition: all 0.3s; }
        .tx-row:hover { background: #161b22; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b-2 border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">MuzzStudio Terminal v1.0</h1>
                <p class="text-slate-500">Monitoreo On-Chain en Tiempo Real</p>
            </div>
            <div class="text-right">
                <div class="flex items-center text-emerald-400 font-bold">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span> LIVE CONNECTED
                </div>
                <code class="text-xs bg-slate-900 p-2 rounded mt-2 block">0xef3dA...B8f0</code>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <aside class="col-span-3 space-y-6">
                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-800 glow">
                    <h3 class="font-bold mb-4 border-l-4 border-sky-400 pl-2">Panel de Control</h3>
                    <label class="text-xs text-slate-500 uppercase">Filtrar Wallet</label>
                    <input type="text" id="walletFilter" placeholder="0x..." class="w-full bg-black border border-slate-700 rounded p-2 text-sm mt-1 mb-4">
                    <button class="w-full bg-sky-500 text-black font-bold py-2 rounded hover:bg-sky-400 transition">Aplicar Filtros</button>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-800">
                    <h3 class="font-bold mb-4 border-l-4 border-rose-500 pl-2">Triggers de IA</h3>
                    <button class="w-full border border-rose-500 text-rose-500 py-2 rounded hover:bg-rose-500/10">Auto-Venta en Whale Dump</button>
                </div>
            </aside>

            <main class="col-span-9 bg-slate-900/30 rounded-xl border border-slate-800 overflow-hidden">
                <div class="p-4 bg-slate-900/80 font-bold border-b border-slate-800">Feed de Transacciones</div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-black/50 text-slate-500">
                        <tr>
                            <th class="p-4">Bloque</th>
                            <th>Tipo</th>
                            <th>Wallet</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="txBody">
                        </tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const txBody = document.getElementById('txBody');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const color = data.type === 'COMPRA' ? 'text-emerald-400' : (data.type === 'VENTA' ? 'text-rose-500' : 'text-slate-400');
            
            const row = `
                <tr class="tx-row animate-in fade-in duration-500">
                    <td class="p-4 text-slate-500">#${data.block}</td>
                    <td class="font-bold ${color}">${data.type}</td>
                    <td class="font-mono text-sky-300 text-xs">${data.from.substring(0,10)}...</td>
                    <td class="font-bold">${parseFloat(data.value).toLocaleString()} MUZZ</td>
                </tr>
            `;
            txBody.insertAdjacentHTML('afterbegin', row);
            if(txBody.children.length > 15) txBody.lastElementChild.remove();
        };
    </script>
</body>
</html>
