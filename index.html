<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Studio Hybrid</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0f0f14; --card: #1a1a24; --accent: #00a8ff; 
            --red: #ff3366; --green: #00ff88; --text: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* CONTENEDOR MÓVIL (CONTROL REMOTO) */
        .remote-interface {
            display: none;
            padding: 20px;
            height: 100vh;
            flex-direction: column;
            box-sizing: border-box;
        }

        .grid-control {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
        }

        .btn-remote {
            background: var(--card);
            border: 2px solid #2a2a3e;
            border-radius: 18px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-remote i { font-size: 2rem; margin-bottom: 10px; }
        .btn-remote:active { transform: scale(0.95); background: var(--bg); }
        .btn-active { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 168, 255, 0.4); }
        .btn-danger { color: var(--red); }
        .btn-success { color: var(--green); }

        /* HEADER MÓVIL */
        .remote-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a3e;
        }

        /* DISEÑO DESKTOP */
        @media (min-width: 769px) {
            .desktop-interface { display: block; padding: 40px; }
            .remote-interface { display: none; }
        }

        /* DISEÑO MÓVIL */
        @media (max-width: 768px) {
            .desktop-interface { display: none; }
            .remote-interface { display: flex; }
        }

        #id-display { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="desktop-interface">
        <h1>🖥️ MODO STUDIO (Desktop)</h1>
        <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2a2a3e;">
            <p>1. Abre esta URL en tu móvil.</p>
            <p>2. Introduce este ID en el móvil:</p>
            <div id="id-display">Conectando...</div>
        </div>
        <canvas id="main-canvas" width="1280" height="720" style="width: 100%; max-width: 800px; background: #000; margin-top: 20px; border-radius: 8px;"></canvas>
    </div>

    <div class="remote-interface">
        <div class="remote-header">
            <h2 style="margin:0; color: var(--accent);">STREAMPRO REMOTE</h2>
            <small id="status">Esperando conexión...</small>
        </div>

        <div class="grid-control">
            <button class="btn-remote" onclick="toggleMobileCam()" id="cam-btn">
                <span>📷</span>
                CAM MOVIL
            </button>

            <button class="btn-remote btn-success" onclick="connectToDesktop()">
                <span>🔗</span>
                VINCULAR
            </button>

            <button class="btn-remote btn-danger" onclick="sendAction('stream')">
                <span>🔴</span>
                LIVE
            </button>

            <button class="btn-remote" onclick="sendAction('record')">
                <span>⏺️</span>
                GRABAR
            </button>

            <button class="btn-remote" onclick="sendAction('mute')">
                <span>🔇</span>
                MUTE
            </button>

            <button class="btn-remote" onclick="sendAction('switch')">
                <span>🖼️</span>
                ESCENA
            </button>
        </div>
    </div>

    <video id="v-hidden" autoplay playsinline muted style="display:none;"></video>

    <script>
        const peer = new Peer();
        let conn;
        let video = document.getElementById('v-hidden');

        // Al generar el ID de sesión
        peer.on('open', id => {
            const display = document.getElementById('id-display');
            if(display) display.innerText = id;
        });

        // DESKTOP: Escucha comandos y video
        peer.on('connection', c => {
            conn = c;
            conn.on('data', data => handleCommand(data));
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                // Pintar en canvas
                const canvas = document.getElementById('main-canvas');
                const ctx = canvas.getContext('2d');
                function draw() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(draw);
                }
                draw();
            });
        });

        // MÓVIL: Funciones de botones
        function connectToDesktop() {
            const remoteId = prompt("Introduce el ID del Desktop:");
            if(remoteId) {
                conn = peer.connect(remoteId);
                document.getElementById('status').innerText = "✅ CONECTADO AL DESKTOP";
                document.getElementById('status').style.color = "var(--green)";
            }
        }

        async function toggleMobileCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                const call = peer.call(conn.peer, stream);
                document.getElementById('cam-btn').classList.add('btn-active');
            } catch (err) {
                alert("Error de cámara: Asegúrate de estar en HTTPS");
            }
        }

        function sendAction(cmd) {
            if(conn) {
                conn.send({ type: 'control', command: cmd });
                console.log("Comando enviado:", cmd);
            } else {
                alert("Primero debes Vincular con el Desktop");
            }
        }

        function handleCommand(data) {
            if(data.type === 'control') {
                alert("Desktop recibió comando: " + data.command);
                // Aquí conectarías con tu lógica de streaming existente
            }
        }
    </script>
</body>
</html>
